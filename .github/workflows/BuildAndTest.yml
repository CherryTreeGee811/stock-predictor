name: StockPredictor
on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'
  workflow_dispatch:
jobs:
  BuildAndTest:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Run Application
      shell: bash
      run: 
        docker compose up -d

    - name: Wait for API and perform health check
      run: |
        echo "Waiting for API to be ready..."
        for i in {1..30}; do
          if curl -s --fail http://localhost:5000/health > /dev/null; then
            echo "API is responding with HTTP 200"
            break
          fi
          echo "Attempt $i/30: API not ready yet..."
          sleep 2
        done
    
        # Fetch the actual response and compare
        RESPONSE=$(curl -s http://localhost:5000/health)
        if [ "$RESPONSE" != '{"status":"ok"}' ]; then
          echo "❌ Health check failed. Expected '{\"status\":\"ok\"}', got: $RESPONSE"
          exit 1
        else
          echo "✅ Health check passed."
        fi
      shell: bash
